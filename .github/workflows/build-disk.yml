---
name: Build disk image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Channel to build the flashable disk image from"
        type: choice
        options: [beta, stable, testing]
        default: beta

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  BIB_IMAGE: "quay.io/centos-bootc/bootc-image-builder:latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    name: Build disk image
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: read

    steps:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies
        run: |
          set -euxo pipefail
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "${GITHUB_ENV}"
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "${GITHUB_ENV}"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            containernetworking-plugins \
            curl \
            jq \
            pigz \
            podman \
            python3

      - name: Check build recipes
        uses: ublue-os/just-action@30ab4659369934b65b655bf8d2fa4ddd6547d384 # v3

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Armada image
        run: |
          set -euxo pipefail
          JUST_BIN=$(command -v just)
          sudo git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          # Build the disk FROM the published container so the disk and the ghcr
          # image are identical content and the installed system's bootc origin
          # points at ghcr (so OTA works). The Justfile pulls the ref for BIB.
          sudo "${JUST_BIN}" build-armada-image "${IMAGE_REGISTRY}/${IMAGE_NAME}" "${{ inputs.tag }}"
          sudo chown -R "$(id -u):$(id -g)" output
          IMG=$(find output -maxdepth 1 -name 'armada-*.img.gz' -type f -print -quit)
          sha256sum "${IMG}" > "${IMG}.sha256"
          ls -lh "${IMG}" "${IMG}.sha256"

      - name: Upload disk image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: armada-disk-image
          path: |
            output/armada-*.img.gz
            output/armada-*.img.gz.sha256
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true
