# Full-stats HUD for the bottom screen (armada-hud-bottom.service). Static:
# Steam never rewrites this file; the AYN button controls visibility by
# starting/stopping the unit. Sized for the Thor's bottom panel (1080x1240
# shown rotated at 1.5x scale); values are pruned through device testing.
table_columns=3
font_size=32
background_alpha=0.8
position=top-left

# Frame pacing and presentation
fps
frametime
frame_timing
frame_timing_detailed
fps_metrics=avg,0.01
refresh_rate
show_fps_limit
present_mode
resolution
hdr
fsr

# CPU
cpu_stats
cpu_mhz
cpu_temp
core_load

# GPU
gpu_stats
gpu_core_clock
gpu_temp
gpu_name

# Memory and storage pressure
ram
swap
procmem
io_read
io_write

# Software stack
dx_api
vulkan_driver
wine
winesync
arch

# Handheld and session status
battery
battery_watt
battery_time
device_battery=gamepad
network=1
time
